<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閱讀共享紀錄系統 - 完美修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .page-node { display: none; }
        .page-node.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .cat-tag { cursor: pointer; padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: bold; background: white; color: #64748b; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .cat-tag.active { background: #2d5a27; color: white; border-color: #2d5a27; box-shadow: 0 4px 12px rgba(45,90,39,0.2); }
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15, 23, 42, 0.9); z-index: 1000; justify-content: center; align-items: flex-start; padding: 20px; overflow-y: auto; backdrop-filter: blur(5px); }
        textarea, input[type="text"] { border: 2px solid #e2e8f0; border-radius: 1rem; padding: 12px; width: 100%; outline: none; background-color: #fcfcfc; }
        .mini-tag { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; margin-right: 4px; margin-bottom: 4px; }
        .full-text-display { white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex gap-2 bg-white/90 backdrop-blur-md p-2 rounded-full shadow-2xl border border-slate-200">
        <button onclick="switchPage('form')" class="px-6 py-2 rounded-full font-bold text-slate-600">✍️ 填寫</button>
        <button onclick="switchPage('query')" class="px-6 py-2 rounded-full font-bold text-slate-600">🔍 查詢</button>
        <button onclick="switchPage('cloud')" class="px-6 py-2 rounded-full font-bold text-slate-600">🌈 文字雲</button>
    </nav>

    <main class="max-w-6xl mx-auto pb-24">
        <div class="space-y-4 mb-8 glass-card p-6 border-l-8 border-[#2d5a27]">
            <h3 class="text-sm font-black text-slate-400 mb-2 uppercase">目前類別</h3>
            <div id="cat-group-1" class="flex flex-wrap gap-2"></div>
            <div id="cat-group-2" class="flex flex-wrap gap-2 border-t pt-4"></div>
        </div>
        
        <section id="page-form" class="page-node active space-y-8">
            <div class="glass-card p-6 md:p-10 border-t-8 border-[#2d5a27]">
                <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">📗 閱讀共享紀錄撰寫</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
                    <div class="space-y-6">
                        <div><label class="block font-bold mb-1">繪本名稱*</label><input type="text" id="title" style="background-color: #fffbeb;"></div>
                        <div><label class="block font-bold mb-1 text-green-800">📌 文字雲關鍵字*</label><input type="text" id="kw" style="background-color: #f0fdf4;" placeholder="空格隔開"></div>
                        <div class="bg-white p-4 rounded-2xl border-2 border-dashed border-slate-200">
                            <label class="block font-bold mb-2">📸 上傳照片</label>
                            <input type="file" id="photo" accept="image/*" class="w-full">
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-amber-50 p-3 rounded-2xl"><label class="block text-xs font-bold text-amber-700">📙 討論關鍵字</label><input type="text" id="discuss"></div>
                            <div class="bg-sky-50 p-3 rounded-2xl"><label class="block text-xs font-bold text-sky-700">🏗️ 鷹架關鍵字</label><input type="text" id="scaffold"></div>
                        </div>
                        <div><label class="block font-bold text-slate-500">🧒 孩子的話</label><textarea id="child" rows="2"></textarea></div>
                        <div><label class="block font-bold text-slate-500">✍️ 我的心得</label><textarea id="feel" rows="2"></textarea></div>
                        <div><label class="block font-bold text-slate-500">📝 詳細內容說明</label><textarea id="others" rows="3"></textarea></div>
                    </div>
                </div>
                <button id="save-btn" onclick="uploadData()" class="w-full bg-[#2d5a27] text-white font-bold py-4 rounded-2xl shadow-xl mt-8 text-lg">確認儲存</button>
            </div>
            <div class="glass-card p-6 md:p-10">
                <h3 class="text-xl font-bold text-slate-700 italic">📂 最新 5 筆紀錄</h3>
                <div id="record-list" class="space-y-4 mt-4"></div>
            </div>
        </section>

        <section id="page-query" class="page-node space-y-8">
            <div class="glass-card p-6 md:p-10">
                <h2 class="text-3xl font-bold text-slate-800 mb-6">🔍 依書名查詢 (<span class="current-cat-label"></span>)</h2>
                <div id="book-query-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </section>

        <section id="page-cloud" class="page-node space-y-8">
            <div class="glass-card p-6 md:p-10 text-center">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold text-slate-800">🌈 <span class="current-cat-label"></span> 文字雲</h2>
                    <select id="queryMode" onchange="refreshUI()" class="bg-white border p-2 rounded-xl">
                        <option value="kw">核心關鍵字</option>
                        <option value="discuss">討論關鍵字</option>
                        <option value="scaffold">鷹架關鍵字</option>
                    </select>
                </div>
                <div id="cloud-container" class="w-full h-[500px]"><canvas id="cloud-canvas"></canvas></div>
            </div>
        </section>
    </main>

    <div id="modal" onclick="closeModal()">
        <div class="bg-white w-full max-w-2xl p-8 rounded-[2.5rem] relative" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-slate-300 hover:text-slate-600 text-4xl">&times;</button>
            <div id="m-body"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzkbWySR4X0vf25J7ZWNvgEdpLtUzpMQHlnRHRy2zvHOt4opftZmsTqADPOxkQkFLysVw/exec";
        const g1 = ["公園", "大樹花草", "鳥類", "好朋友", "建築與設施", "爺爺奶奶"], g2 = ["生活自理", "性別平等", "其他"];
        let currentCat = "公園", db = [];

        function clean(str) {
            const s = String(str || "").trim();
            return s.startsWith("data:image") ? "" : s;
        }

        function init() {
            const b1 = document.getElementById('cat-group-1'), b2 = document.getElementById('cat-group-2');
            [...g1, ...g2].forEach(cat => {
                const b = document.createElement('div');
                b.className = `cat-tag ${cat === currentCat ? 'active' : ''}`;
                b.innerText = cat;
                b.onclick = (e) => {
                    currentCat = cat;
                    document.querySelectorAll('.cat-tag').forEach(tag => tag.classList.remove('active'));
                    e.target.classList.add('active');
                    document.querySelectorAll('.current-cat-label').forEach(el => el.innerText = cat);
                    renderList(); renderQueryList(); refreshUI();
                };
                (g1.includes(cat) ? b1 : b2).appendChild(b);
            });
            fetchData();
        }

        async function fetchData() {
            try { const res = await fetch(API_URL); db = await res.json(); renderList(); renderQueryList(); refreshUI(); } catch(e) {}
        }

        function switchPage(page) {
            document.querySelectorAll('.page-node').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            if(page === 'cloud') setTimeout(refreshUI, 300);
            window.scrollTo(0,0);
        }

        function recordTemplate(r) {
            const photo = r.find(cell => String(cell).startsWith("data:image") || String(cell).startsWith("https://drive.google.com"));
            const makeTags = (str, color) => String(str || "").split(/[\s,，、]+/).filter(t => t).map(t => `<span class="mini-tag ${color}">#${t}</span>`).join('');
            
            return `
                <div class="py-6 border-b last:border-none space-y-4">
                    <div>
                        <h4 class="font-bold text-2xl text-[#2d5a27] mb-2">📖 ${clean(r[1])}</h4>
                        <div class="flex flex-wrap">${makeTags(r[2], 'bg-green-100 text-green-700')} ${makeTags(r[6], 'bg-amber-100 text-amber-700')} ${makeTags(r[7], 'bg-sky-100 text-sky-700')}</div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        <div class="bg-amber-50 p-4 rounded-2xl"><b>🧒 孩子的話：</b><div class="full-text-display">${clean(r[3]) || '無'}</div></div>
                        <div class="bg-sky-50 p-4 rounded-2xl"><b>✍️ 我的心得：</b><div class="full-text-display">${clean(r[4]) || '無'}</div></div>
                    </div>
                    <div class="bg-green-50 p-5 rounded-2xl border border-green-100"><b>📝 詳細說明：</b><div class="full-text-display">${clean(r[8]) || '無'}</div></div>
                    ${photo ? `<div class="text-center pt-2"><img src="${photo}" class="inline-block max-w-full rounded-2xl shadow-lg border-2 border-white"></div>` : ''}
                </div>`;
        }

        function renderList() {
            const list = document.getElementById('record-list');
            const filtered = db.filter(r => String(r[0]).trim() === currentCat);
            list.innerHTML = filtered.length ? "" : "尚無紀錄";
            [...filtered].reverse().slice(0, 5).forEach(r => {
                const item = document.createElement('div');
                item.className = "bg-white p-5 rounded-2xl border flex justify-between items-center cursor-pointer shadow-sm";
                item.innerHTML = `<h4 class="font-bold text-[#2d5a27]">📖 ${clean(r[1])}</h4><span>❯</span>`;
                item.onclick = () => { document.getElementById('m-body').innerHTML = recordTemplate(r); document.getElementById('modal').style.display = 'flex'; };
                list.appendChild(item);
            });
        }

        function renderQueryList() {
            const container = document.getElementById('book-query-list');
            const filtered = db.filter(r => String(r[0]).trim() === currentCat);
            const bookNames = [...new Set(filtered.map(r => clean(r[1])))].filter(n => n);
            container.innerHTML = bookNames.length ? "" : "目前無紀錄";
            bookNames.forEach(name => {
                const btn = document.createElement('div');
                btn.className = "bg-white p-4 rounded-2xl border-2 hover:border-[#2d5a27] cursor-pointer font-bold text-[#2d5a27] text-center shadow-sm";
                btn.innerText = "📖 " + name;
                btn.onclick = () => {
                    const matched = db.filter(r => clean(r[1]) === name && String(r[0]).trim() === currentCat);
                    const body = document.getElementById('m-body');
                    body.innerHTML = `<h2 class="text-3xl font-black border-b-4 border-[#2d5a27] pb-2 mb-6">📚 ${name}</h2>`;
                    matched.reverse().forEach(r => body.innerHTML += recordTemplate(r));
                    document.getElementById('modal').style.display = 'flex';
                };
                container.appendChild(btn);
            });
        }

        function refreshUI() {
            const mode = document.getElementById('queryMode').value;
            const filtered = db.filter(r => String(r[0]).trim() === currentCat);
            const freq = {};
            let col = mode === "kw" ? 2 : (mode === "discuss" ? 6 : 7);
            filtered.forEach(r => {
                const content = clean(r[col]);
                if(content) content.split(/[\s,，、]+/).forEach(w => { if(w) freq[w] = (freq[w] || 0) + 1; });
            });
            const cvs = document.getElementById('cloud-canvas'), cnt = document.getElementById('cloud-container');
            if(!cvs) return;
            cvs.width = cnt.offsetWidth; cvs.height = 500;
            WordCloud(cvs, {
                list: Object.entries(freq).map(([w, c]) => [w, Math.min(c * 15 + 30, 100)]),
                click: (item) => {
                    const matched = db.filter(r => String(r[0]).trim() === currentCat && String(r[col]).includes(item[0]));
                    const body = document.getElementById('m-body');
                    body.innerHTML = `<h2 class="text-3xl font-black border-b-4 border-[#2d5a27] pb-2 mb-6 text-[#2d5a27]">🔍 ${item[0]}</h2>`;
                    matched.reverse().forEach(r => body.innerHTML += recordTemplate(r));
                    document.getElementById('modal').style.display = 'flex';
                },
                fontFamily: 'Noto Sans TC', color: '#2d5a27', rotateRatio: 0, backgroundColor: '#ffffff'
            });
        }

        async function uploadData() {
            const btn = document.getElementById('save-btn'), file = document.getElementById('photo').files[0];
            const data = {
                cat: currentCat, title: document.getElementById('title').value, kw: document.getElementById('kw').value,
                child: document.getElementById('child').value, feel: document.getElementById('feel').value,
                useType: Array.from(document.querySelectorAll('input[name="useType"]:checked')).map(el => el.value).join(", "),
                discuss: document.getElementById('discuss').value, scaffold: document.getElementById('scaffold').value,
                others: document.getElementById('others').value, img: file ? await toBase64(file) : ""
            };
            if(!data.title || !data.kw) return alert("請填寫必填欄位");
            btn.disabled = true; btn.innerText = "儲存中...";
            try { await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }); alert("✅ 儲存成功！"); location.reload(); } catch(e) { btn.disabled = false; }
        }

        const toBase64 = f => new Promise(res => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => res(rd.result); });
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>
}
