<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閱讀共享紀錄系統 - 最終專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .page-node { display: none; }
        .page-node.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* 標籤式勾選框 */
        .check-tag { cursor: pointer; transition: all 0.2s; border: 2px solid #f1f5f9; border-radius: 999px; padding: 6px 16px; font-size: 13px; font-weight: bold; color: #94a3b8; display: inline-block; background: #f8fafc; }
        input[type="checkbox"]:checked + .check-tag { background-color: #2d5a27; color: white; border-color: #2d5a27; }
        
        /* 分類標籤 */
        .cat-tag { cursor: pointer; padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: bold; background: white; color: #64748b; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .cat-tag.active { background: #2d5a27; color: white; border-color: #2d5a27; box-shadow: 0 4px 12px rgba(45,90,39,0.2); }
        
        #cloud-container { width: 100%; height: 600px; background: white; border-radius: 2rem; border: 1px solid #f1f5f9; position: relative; }
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15, 23, 42, 0.95); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        
        /* 輸入框通用樣式與底色優化 */
        textarea, input[type="text"] { border: 2px solid #e2e8f0; border-radius: 1rem; padding: 12px; width: 100%; outline: none; transition: all 0.2s; background-color: #fcfcfc; }
        textarea:focus, input:focus { border-color: #2d5a27; box-shadow: 0 0 0 3px rgba(45, 90, 39, 0.1); }

        /* 特定欄位底色 */
        .input-required { background-color: #fffbeb !important; border-color: #fcd34d !important; } /* 必填淡黃底 */
        .input-discuss { background-color: #fff7ed !important; border-color: #fdba74 !important; } /* 橘色底 */
        .input-scaffold { background-color: #f0f9ff !important; border-color: #7dd3fc !important; } /* 藍色底 */
        .input-normal { background-color: #f8fafc !important; } /* 一般淡灰底 */
        
        .required-star { color: #ef4444; margin-left: 2px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="fixed top-4 right-4 md:top-6 md:right-6 z-50 flex gap-2">
        <button onclick="switchPage('form')" class="bg-white border shadow-lg px-4 md:px-6 py-2 rounded-full font-bold text-slate-600 hover:bg-slate-50 transition">✍️ 填寫/列表</button>
        <button onclick="switchPage('cloud')" class="bg-white border shadow-lg px-4 md:px-6 py-2 rounded-full font-bold text-slate-600 hover:bg-slate-50 transition">🌈 視覺文字雲</button>
    </nav>

    <main class="max-w-6xl mx-auto pt-12 md:pt-0">
        
        <section id="page-form" class="page-node active space-y-8">
            <div class="glass-card p-6 md:p-10 border-t-8 border-[#2d5a27]">
                <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">📗 閱讀共享紀錄撰寫</h2>
                
                <div class="space-y-4 mb-8 bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                    <div class="flex flex-col md:flex-row md:items-center gap-4">
                        <span class="text-xs font-black text-slate-400 w-24">社區議題</span>
                        <div id="cat-group-1" class="flex flex-wrap gap-2"></div>
                    </div>
                    <div class="flex flex-col md:flex-row md:items-center gap-4 border-t border-slate-200 pt-4">
                        <span class="text-xs font-black text-slate-400 w-24">其他議題</span>
                        <div id="cat-group-2" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">繪本名稱<span class="required-star">*必填</span></label>
                            <input type="text" id="title" class="input-required" placeholder="請輸入繪本或書籍名稱">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-green-800 mb-1">📌 文字雲關鍵字 (筆記核心)<span class="required-star">*必填</span></label>
                            <input type="text" id="kw" class="input-required" placeholder="如：踏查 種植 貢獻 (空格隔開)">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-2">使用方式 (可多選)</label>
                            <div class="flex flex-wrap gap-2">
                                <label><input type="checkbox" name="useType" value="團體討論" class="hidden"><span class="check-tag">團體討論</span></label>
                                <label><input type="checkbox" name="useType" value="學習區鷹架" class="hidden"><span class="check-tag">學習區鷹架</span></label>
                                <label><input type="checkbox" name="useType" value="自由閱讀" class="hidden"><span class="check-tag">自由閱讀</span></label>
                                <label><input type="checkbox" name="useType" value="延伸活動" class="hidden"><span class="check-tag">延伸活動</span></label>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-amber-50 p-3 rounded-2xl border border-amber-200 shadow-sm">
                                <label class="block text-xs font-bold text-amber-700 mb-1">📙 繪本討論關鍵字</label>
                                <input type="text" id="discuss" class="input-discuss" placeholder="角色 衝突">
                            </div>
                            <div class="bg-sky-50 p-3 rounded-2xl border border-sky-200 shadow-sm">
                                <label class="block text-xs font-bold text-sky-700 mb-1">🏗️ 鷹架引導關鍵字</label>
                                <input type="text" id="scaffold" class="input-scaffold" placeholder="提問 示範">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">🧒 孩子的話</label>
                                <textarea id="child" class="input-normal" rows="2"></textarea>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">✍️ 我的心得</label>
                                <textarea id="feel" class="input-normal" rows="2"></textarea>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-1">詳細內容說明 (具體紀錄)</label>
                            <textarea id="others" class="input-normal" rows="3" placeholder="在此輸入完整的觀察過程..."></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-1">📸 上傳照片</label>
                            <input type="file" id="photo" accept="image/*" class="text-xs w-full bg-white p-2 rounded-lg border-2 border-dashed">
                        </div>
                    </div>
                </div>
                <div class="text-center">
                    <p class="text-xs text-red-500 mb-2 font-bold italic">※ 請確認「書名」與「核心關鍵字」皆已填寫再點擊儲存</p>
                    <button id="save-btn" onclick="uploadData()" class="w-full bg-[#2d5a27] text-white font-bold py-4 rounded-2xl shadow-xl text-lg hover:opacity-90 active:scale-95 transition">確認儲存並同步至雲端</button>
                </div>
            </div>

            <div class="glass-card p-6 md:p-10">
                <h3 class="text-xl font-bold text-slate-700 mb-6 flex items-center justify-between">
                    📂 歷史紀錄列表 (<span id="list-cat-label" class="text-green-700">公園</span>)
                </h3>
                <div id="record-list" class="space-y-4">
                    <p class="text-slate-400 italic text-center py-10">正在載入紀錄...</p>
                </div>
            </div>
        </section>

        <section id="page-cloud" class="page-node space-y-8">
            <div class="glass-card p-6 md:p-10">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h2 class="text-3xl font-bold text-slate-800">🌈 成果視覺雲：<span id="cloud-cat-label" class="text-[#2d5a27]">公園</span></h2>
                    <div class="flex items-center gap-3 bg-slate-100 p-2 rounded-2xl border border-slate-200">
                        <label class="text-xs font-bold text-slate-500 px-2">切換觀點</label>
                        <select id="queryMode" onchange="refreshUI()" class="bg-white rounded-xl px-4 py-2 font-bold text-slate-700 text-sm outline-none shadow-sm cursor-pointer">
                            <option value="kw">筆記核心關鍵字</option>
                            <option value="discuss">繪本討論關鍵字</option>
                            <option value="scaffold">鷹架引導關鍵字</option>
                        </select>
                    </div>
                </div>
                <div id="cloud-container">
                    <canvas id="cloud-canvas" class="cursor-pointer"></canvas>
                </div>
                <p class="text-center text-slate-400 text-sm mt-4 italic">點擊單字可查看包含該詞的所有詳細紀錄與照片</p>
            </div>
        </section>
    </main>

    <div id="modal" onclick="closeModal()">
        <div class="bg-white w-full max-w-2xl p-8 rounded-[2.5rem] max-h-[90vh] overflow-y-auto relative shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-slate-300 hover:text-slate-600 text-4xl font-bold">&times;</button>
            <div id="m-body" class="space-y-6"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzkbWySR4X0vf25J7ZWNvgEdpLtUzpMQHlnRHRy2zvHOt4opftZmsTqADPOxkQkFLysVw/exec";
        
        const group1 = ["公園", "大樹花草", "鳥類", "好朋友", "建築", "設施", "爺爺奶奶"];
        const group2 = ["生活自理", "性別平等", "其他"];
        let currentCat = "公園", db = [];

        function init() {
            const b1 = document.getElementById('cat-group-1');
            const b2 = document.getElementById('cat-group-2');
            
            [...group1, ...group2].forEach(cat => {
                const b = document.createElement('div');
                b.className = `cat-tag ${cat === currentCat ? 'active' : ''}`;
                b.innerText = cat;
                b.onclick = (e) => {
                    currentCat = cat;
                    document.querySelectorAll('.cat-tag').forEach(tag => tag.classList.remove('active'));
                    e.target.classList.add('active');
                    document.getElementById('cloud-cat-label').innerText = cat;
                    document.getElementById('list-cat-label').innerText = cat;
                    refreshUI();
                    renderList();
                };
                if(group1.includes(cat)) b1.appendChild(b);
                else b2.appendChild(b);
            });
            fetchData();
        }

        async function fetchData() {
            try { 
                const res = await fetch(API_URL); 
                db = await res.json(); 
                refreshUI(); 
                renderList(); 
            } catch(e) { console.error("資料抓取失敗", e); }
        }

        function switchPage(page) {
            document.querySelectorAll('.page-node').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            if(page === 'cloud') setTimeout(refreshUI, 200);
            window.scrollTo(0,0);
        }

        function refreshUI() {
            const mode = document.getElementById('queryMode').value;
            const filtered = db.filter(r => String(r[0]).trim() === currentCat);
            const freq = {};
            let colIndex = (mode === "kw") ? 2 : (mode === "discuss" ? 6 : 7);
            let color = mode === "discuss" ? '#d97706' : (mode === "scaffold" ? '#0284c7' : '#2d5a27');

            filtered.forEach(r => {
                const words = String(r[colIndex] || "").split(/[\s,，、]+/).filter(w => w.length > 0);
                words.forEach(w => { freq[w] = (freq[w] || 0) + 1; });
            });

            const cvs = document.getElementById('cloud-canvas'), cnt = document.getElementById('cloud-container');
            cvs.width = cnt.offsetWidth; cvs.height = 600;
            
            WordCloud(cvs, {
                list: Object.entries(freq).map(([w, c]) => [w, Math.min(c * 15 + 30, 100)]),
                click: (item) => showDetailsByWord(item[0]),
                fontFamily: 'Noto Sans TC', color: color, rotateRatio: 0, backgroundColor: '#ffffff', gridSize: 10, weightFactor: 1
            });
        }

        function renderList() {
            const list = document.getElementById('record-list');
            const filtered = db.filter(r => String(r[0]).trim() === currentCat);
            list.innerHTML = filtered.length ? "" : "<p class='text-slate-400 italic text-center py-10'>目前此類別尚無紀錄</p>";
            
            [...filtered].reverse().forEach(r => {
                const item = document.createElement('div');
                item.className = "bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex flex-col md:flex-row gap-4 items-center cursor-pointer hover:border-green-300 transition";
                item.innerHTML = `
                    <div class="flex-grow w-full text-left">
                        <div class="flex justify-between items-center mb-2">
                            <h4 class="font-bold text-[#2d5a27] text-lg">📖 ${r[1]}</h4>
                            <span class="text-[10px] bg-slate-100 px-2 py-1 rounded text-slate-500 font-bold">${r[5]}</span>
                        </div>
                        <p class="text-sm text-slate-600 mb-1 italic">「${r[3] || '無對話紀錄'}」</p>
                        <p class="text-xs text-slate-400 line-clamp-1">${r[8] || '無詳細說明'}</p>
                    </div>
                    ${r[9] && r[9].length > 100 ? `<img src="${r[9]}" class="w-16 h-16 object-cover rounded-xl border">` : ''}
                `;
                item.onclick = () => showDetailsOneRecord(r);
                list.appendChild(item);
            });
        }

        function showDetailsByWord(kw) {
            const mode = document.getElementById('queryMode').value;
            let col = mode === "kw" ? 2 : (mode === "discuss" ? 6 : 7);
            const matched = db.filter(r => String(r[0]).trim() === currentCat && String(r[col]).includes(kw));
            const body = document.getElementById('m-body');
            body.innerHTML = `<h2 class="text-3xl font-bold text-slate-800 border-b pb-4">關鍵字：${kw}</h2>`;
            matched.forEach(r => body.innerHTML += recordTemplate(r));
            document.getElementById('modal').style.display = 'flex';
        }

        function showDetailsOneRecord(r) {
            const body = document.getElementById('m-body');
            body.innerHTML = recordTemplate(r);
            document.getElementById('modal').style.display = 'flex';
        }

        function recordTemplate(r) {
            return `
                <div class="py-8 border-b last:border-none">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="font-bold text-xl text-[#2d5a27]">📖 ${r[1]}</h4>
                        <span class="text-xs bg-slate-100 p-2 rounded-xl font-black">${r[5]}</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        <div class="bg-slate-50 p-4 rounded-2xl"><b>🧒 孩子的話：</b><br>${r[3] || '未記錄'}</div>
                        <div class="bg-slate-50 p-4 rounded-2xl"><b>✍️ 教學心得：</b><br>${r[4] || '未記錄'}</div>
                        <div class="md:col-span-2 bg-green-50 p-4 rounded-2xl border border-green-100"><b>📝 詳細內容說明：</b><br>${r[8] || '無'}</div>
                    </div>
                    ${r[9] && r[9].startsWith('data:image') ? `<img src="${r[9]}" class="w-full rounded-[2rem] shadow-xl border-4 border-white mt-6">` : ''}
                </div>`;
        }

        async function uploadData() {
            const btn = document.getElementById('save-btn'), file = document.getElementById('photo').files[0];
            const titleVal = document.getElementById('title').value;
            const kwVal = document.getElementById('kw').value;

            if(!titleVal || !kwVal) {
                alert("🔴 儲存失敗！\n「書名」與「核心關鍵字」為必填欄位，請填寫後再試。");
                return;
            }
            
            btn.disabled = true; btn.innerText = "同步中...";
            const data = {
                cat: currentCat,
                title: titleVal,
                kw: kwVal,
                child: document.getElementById('child').value,
                feel: document.getElementById('feel').value,
                useType: Array.from(document.querySelectorAll('input[name="useType"]:checked')).map(el => el.value).join(", "),
                discuss: document.getElementById('discuss').value,
                scaffold: document.getElementById('scaffold').value,
                others: document.getElementById('others').value,
                img: file ? await toBase64(file) : ""
            };

            try { 
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }); 
                alert("✅ 儲存成功！資料已同步至雲端。"); 
                location.reload(); 
            } catch(e) { 
                alert("❌ 連線失敗，請檢查網路狀態。"); 
                btn.disabled = false; 
                btn.innerText = "確認儲存並同步至雲端";
            }
        }

        const toBase64 = f => new Promise(res => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => res(rd.result); });
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>
