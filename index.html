<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閱讀共享紀錄系統 - 南港版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; padding-bottom: 100px; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .page-node { display: none; }
        .page-node.active { display: block; }
        .cat-tag { cursor: pointer; padding: 10px 20px; border-radius: 12px; font-size: 14px; font-weight: bold; background: white; color: #64748b; border: 1px solid #e2e8f0; margin: 4px; transition: all 0.2s; }
        .cat-tag.active { background: #2d5a27; color: white; border-color: #2d5a27; box-shadow: 0 4px 10px rgba(45,90,39,0.2); }
        textarea, input[type="text"] { border: 2px solid #e2e8f0; border-radius: 1rem; padding: 12px; width: 100%; outline: none; transition: border-color 0.2s; }
        textarea:focus, input[type="text"]:focus { border-color: #2d5a27; }
        .inspiration-btn { background: #f0fdf4; color: #166534; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: bold; border: 1px solid #bbf7d0; cursor: pointer; }
        .inspiration-btn:hover { background: #dcfce7; }
        .check-tag { cursor: pointer; transition: all 0.2s; border: 2px solid #e2e8f0; border-radius: 1rem; padding: 12px; font-size: 14px; font-weight: bold; color: #94a3b8; display: block; background: #f8fafc; text-align: center; }
        input[type="checkbox"]:checked + .check-tag { background-color: #2d5a27; color: white; border-color: #2d5a27; }
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-w: 800px; border-radius: 2rem; padding: 2rem; margin: 2rem auto; position: relative; }
    </style>
</head>
<body>
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex gap-2 bg-white/90 p-2 rounded-full shadow-2xl border border-slate-200 backdrop-blur-md">
        <button onclick="switchPage('form')" class="px-6 py-2 rounded-full font-bold hover:bg-green-50 transition">✍️ 填寫</button>
        <button onclick="switchPage('query')" class="px-6 py-2 rounded-full font-bold hover:bg-green-50 transition">🔍 查詢</button>
        <button onclick="switchPage('cloud')" class="px-6 py-2 rounded-full font-bold hover:bg-green-50 transition">🌈 文字雲</button>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <h1 class="text-3xl font-bold text-center text-[#2d5a27] mb-8">閱讀共讀筆記-南港幼兒園版</h1>
        
        <div class="glass-card p-6 mb-8 border-l-8 border-[#2d5a27]">
            <h3 class="text-xs font-black text-slate-400 mb-4 text-center tracking-widest uppercase">選擇類別 (決定顯示內容)</h3>
            <div id="cat-group-1" class="flex flex-wrap justify-center"></div>
            <div id="cat-group-2" class="flex flex-wrap justify-center border-t mt-4 pt-4"></div>
        </div>

        <section id="page-form" class="page-node active space-y-8">
            <div class="glass-card p-8 border-t-8 border-[#2d5a27]">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
                    <div class="space-y-6">
                        <div><label class="block font-bold mb-1">繪本名稱*</label><input type="text" id="title" style="background-color: #fffbeb;" placeholder="輸入完整書名"></div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-green-800">📌 核心關鍵字*</label><button onclick="getInspiration('kw')" class="inspiration-btn">✨ 建議關鍵字</button></div>
                            <input type="text" id="kw" style="background-color: #f0fdf4;" placeholder="關鍵字會用於生成內容">
                        </div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-pink-700">💬 孩子的話</label><button onclick="getInspiration('childTalk')" class="inspiration-btn">✨ 生成段落</button></div>
                            <textarea id="childTalk" rows="2" placeholder="紀錄孩子的反應"></textarea>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border-2 border-dashed border-slate-200"><label class="block font-bold mb-2">📸 上傳照片</label><input type="file" id="photo" accept="image/*" class="w-full text-xs"></div>
                        <div>
                            <label class="block font-bold mb-2 text-slate-500">使用方式 (多選)</label>
                            <div class="grid grid-cols-2 gap-2">
                                <label><input type="checkbox" name="useType" value="團體討論" class="hidden"><span class="check-tag">團體討論</span></label>
                                <label><input type="checkbox" name="useType" value="學習區鷹架" class="hidden"><span class="check-tag">學習區鷹架</span></label>
                                <label><input type="checkbox" name="useType" value="自由閱讀" class="hidden"><span class="check-tag">自由閱讀</span></label>
                                <label><input type="checkbox" name="useType" value="延伸活動" class="hidden"><span class="check-tag">延伸活動</span></label>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div><label class="block font-bold text-amber-700">📙 出版資訊*</label><input type="text" id="publish" placeholder="作者/出版社"></div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-sky-700">🏗️ 提問引導*</label><button onclick="getInspiration('guide')" class="inspiration-btn">✨ 生成段落</button></div>
                            <textarea id="guide" rows="5" placeholder="點擊按鈕自動生成提問"></textarea>
                        </div>
                        <div>
                            <label class="block font-bold text-slate-500 mb-1">📝 詳細內容說明</label>
                            <textarea id="others" rows="3" placeholder="更多補充細節..."></textarea>
                        </div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="font-bold text-slate-500">✍️ 我的心得</label><button onclick="getInspiration('feel')" class="inspiration-btn">✨ 生成段落</button></div>
                            <textarea id="feel" rows="3" placeholder="紀錄您的共讀心得"></textarea>
                        </div>
                    </div>
                </div>
                <button id="save-btn" onclick="uploadData()" class="w-full bg-[#2d5a27] text-white font-bold py-4 rounded-2xl shadow-xl mt-8 hover:bg-[#1e3d1a] transition duration-300">確認儲存並同步試算表</button>
            </div>
            <div class="glass-card p-6">
                <h3 class="text-xl font-bold text-slate-700 mb-4 italic">📂 最近紀錄 (連動選取類別)</h3>
                <div id="record-list" class="space-y-3"></div>
            </div>
        </section>

        <section id="page-query" class="page-node space-y-8">
            <div class="glass-card p-8">
                <h2 class="text-2xl font-bold text-center mb-6">🔍 快速查詢書籍</h2>
                <input type="text" id="querySearch" oninput="renderQueryList()" placeholder="搜尋書名、作者或關鍵字..." class="w-full p-4 border-2 border-green-100 rounded-2xl mb-8 outline-none">
                <div id="book-query-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </section>

        <section id="page-cloud" class="page-node space-y-8">
            <div class="glass-card p-8 text-center">
                <h2 class="text-2xl font-bold mb-6">🌈 核心關鍵字文字雲</h2>
                <div id="cloud-container" class="w-full h-[500px] bg-slate-50 rounded-3xl"><canvas id="cloud-canvas"></canvas></div>
            </div>
        </section>
    </main>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-4xl hover:text-red-500 transition">&times;</button>
            <div id="m-body"></div>
        </div>
    </div>

    <script>
        // 🔴 這裡填入您「新部署」得到的最新網址
        const API_URL = "https://script.google.com/macros/s/AKfycby25k6qhqcMzyFKLaKL6zBx_ks3sBUH4jLXGGFTk4QLWLWcO8B-JcuVtnVZICivUXrF/exec";

        const g1 = ["公園", "大樹花草", "鳥類", "好朋友", "建築與設施", "爺爺奶奶", "交通工具"];
        const g2 = ["SEL", "SDGs", "名人傳記", "生活自理", "性別平等", "生命教育", "其他"];
        const keywordSuggestions = { "公園": "自然觀察", "交通工具": "工程運輸", "SEL": "情緒", "生命教育": "生命循環、尊重與愛" };

        window.selectedCats = ["公園"]; let db = [];

        function switchPage(p) {
            document.querySelectorAll('.page-node').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            if (p === 'cloud') { setTimeout(renderCloud, 500); }
            window.scrollTo(0, 0);
        }

        // 🖼️ 圖片連結相容轉換
        function getThumbnail(photoData) {
            if (!photoData || photoData === "無照片" || photoData.includes("失敗")) return "";
            let id = "";
            if (photoData.includes("id=")) {
                id = photoData.split("id=")[1].split("&")[0];
            } else if (photoData.includes("/d/")) {
                id = photoData.split("/d/")[1].split("/")[0];
            }
            return id ? `https://drive.google.com/thumbnail?id=${id}&sz=s1000` : "";
        }

        function init() {
            const b1 = document.getElementById('cat-group-1'), b2 = document.getElementById('cat-group-2');
            if (!b1 || !b2) return;
            b1.innerHTML = ""; b2.innerHTML = "";
            [...g1, ...g2].forEach(cat => {
                const b = document.createElement('div');
                b.className = `cat-tag ${window.selectedCats.includes(cat) ? 'active' : ''}`;
                b.innerText = cat;
                b.onclick = () => {
                    if (window.selectedCats.includes(cat)) { 
                        if (window.selectedCats.length > 1) window.selectedCats = window.selectedCats.filter(c => c !== cat); 
                    } else { 
                        window.selectedCats.push(cat); 
                    }
                    init(); renderList(); renderQueryList();
                    if(document.getElementById('page-cloud').classList.contains('active')) renderCloud();
                };
                (g1.includes(cat) ? b1 : b2).appendChild(b);
            });
            if(db.length === 0) fetchData();
        }

        async function fetchData() { 
            try { 
                const res = await fetch(API_URL); 
                db = await res.json(); 
                renderList(); 
            } catch(e){ console.error("資料獲取失敗", e); } 
        }

        async function getInspiration(target) {
            const title = document.getElementById('title').value;
            const kw = document.getElementById('kw').value;
            if (target === 'kw') { 
                document.getElementById('kw').value = window.selectedCats.map(c => keywordSuggestions[c] || "自由探索").join("、"); 
                return; 
            }
            if (!title) return alert("請先輸入繪本名稱");
            const btn = event.target;
            btn.innerText = "⏳";
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "ai_generate", title: title, keywords: kw, target: target, cat: window.selectedCats.join(", ") }) 
                });
                const result = await res.json();
                document.getElementById(target).value = result.text;
            } catch (e) { alert("生成失敗"); } 
            finally { btn.innerText = "✨ 生成段落"; }
        }

        async function uploadData() {
            const btn = document.getElementById('save-btn');
            const title = document.getElementById('title').value;
            if (!title) return alert("請輸入書名");
            btn.disabled = true; btn.innerText = "儲存中...";

            let imgData = ""; const file = document.getElementById('photo').files[0];
            if (file) {
                imgData = await new Promise(res => { 
                    const rd = new FileReader(); rd.onload = e => res(e.target.result); rd.readAsDataURL(file); 
                });
            }

            const sendData = { 
                cat: window.selectedCats.join(", "), title, kw: document.getElementById('kw').value, 
                childTalk: document.getElementById('childTalk').value, feel: document.getElementById('feel').value, 
                useType: Array.from(document.querySelectorAll('input[name="useType"]:checked')).map(el => el.value).join(", ") || "未註記", 
                publish: document.getElementById('publish').value, guide: document.getElementById('guide').value, 
                others: document.getElementById('others').value, img: imgData 
            };

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(sendData) });
                alert("✅ 儲存指令已發送！\n系統即將重新整理以同步資料。"); 
                location.reload(); 
            } catch(e) { 
                alert("儲存失敗，請檢查網路。"); btn.disabled = false; 
            }
        }

        function renderDetail(r) {
            const thumb = getThumbnail(r[9]);
            return `<div class="space-y-4">
                <h4 class="text-3xl font-bold text-green-800 border-b pb-2">📖 ${r[1]}</h4>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm text-slate-500">
                    <span>📍 類別: ${r[0]}</span><span>🏷️ 關鍵字: <b class="text-green-600">${r[2]}</b></span>
                    <span class="sm:col-span-2">📙 出版: ${r[6]}</span>
                </div>
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100"><b>🏗️ 提問引導：</b><p class="whitespace-pre-wrap mt-1 text-sm">${r[7]}</p></div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200"><b>📝 詳細內容：</b><p class="whitespace-pre-wrap mt-1 text-sm">${r[8] || "無"}</p></div>
                <div class="bg-sky-50 p-4 rounded-xl border border-sky-100"><b>✍️ 我的心得：</b><p class="whitespace-pre-wrap mt-1 text-sm">${r[4]}</p></div>
                <div class="bg-pink-50 p-4 rounded-xl border border-pink-100"><b>💬 孩子的話：</b><p class="whitespace-pre-wrap mt-1 text-sm">${r[3]}</p></div>
                ${thumb ? `<img src="${thumb}" class="w-full rounded-2xl shadow-lg border-4 border-white mt-4">` : ""}
            </div>`;
        }

        function renderList() {
            const list = document.getElementById('record-list');
            if (!list) return;
            const filtered = db.filter(r => window.selectedCats.some(sel => String(r[0]).includes(sel)));
            list.innerHTML = filtered.length ? "" : "<p class='text-center py-10 text-slate-400'>目前無紀錄</p>";
            filtered.slice(0, 5).forEach(r => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl border cursor-pointer hover:bg-green-50 shadow-sm transition mb-2";
                div.innerHTML = `<h4 class="font-bold text-green-900">📖 ${r[1]}</h4><p class="text-xs text-slate-400 mt-1">${r[2]}</p>`;
                div.onclick = () => { document.getElementById('m-body').innerHTML = renderDetail(r); document.getElementById('modal').style.display = 'block'; };
                list.appendChild(div);
            });
        }

        function renderQueryList(term = "") {
            const container = document.getElementById('book-query-list');
            const queryField = document.getElementById('querySearch');
            if (term) queryField.value = term;
            const query = queryField.value.toLowerCase();
            const filtered = db.filter(r => {
                const matchCat = window.selectedCats.some(sel => String(r[0]).includes(sel));
                const matchText = r.some(cell => String(cell).toLowerCase().includes(query));
                return matchCat && matchText;
            });
            container.innerHTML = filtered.length ? "" : "<p class='col-span-full text-center py-20 text-slate-400'>找不到符合目前類別的書籍</p>";
            [...new Set(filtered.map(r => r[1]))].forEach(name => {
                const btn = document.createElement('div');
                btn.className = "bg-white p-5 rounded-2xl border cursor-pointer text-center font-bold text-green-800 shadow-sm hover:border-green-500 transition";
                btn.innerText = "📖 " + name;
                btn.onclick = () => {
                    const matched = db.filter(r => r[1] === name);
                    document.getElementById('m-body').innerHTML = matched.map(r => renderDetail(r)).join('<hr class="my-10 border-dashed">');
                    document.getElementById('modal').style.display = 'block';
                };
                container.appendChild(btn);
            });
        }

        function renderCloud() {
            const freq = {};
            const filteredData = db.filter(r => window.selectedCats.some(sel => String(r[0]).includes(sel)));
            filteredData.forEach(r => {
                if (r[2]) String(r[2]).split(/[、,， ]+/).forEach(w => {
                    if (w.length > 1) freq[w] = (freq[w] || 0) + 1;
                });
            });
            const cvs = document.getElementById('cloud-canvas'), cnt = document.getElementById('cloud-container');
            if (!cvs) return;
            cvs.width = cnt.offsetWidth; cvs.height = 500;
            WordCloud(cvs, { 
                list: Object.entries(freq).map(([w, c]) => [w, Math.min(c * 15 + 20, 100)]), 
                color: 'random-dark', rotateRatio: 0, backgroundColor: '#f8fafc',
                click: (item) => { switchPage('query'); renderQueryList(item[0]); }
            });
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>
