<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閱讀共享紀錄系統 - 南港幼教專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; padding-bottom: 80px; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .page-node { display: none; }
        .page-node.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .check-tag { cursor: pointer; transition: all 0.2s; border: 2px solid #f1f5f9; border-radius: 999px; padding: 6px 16px; font-size: 13px; font-weight: bold; color: #94a3b8; display: inline-block; background: #f8fafc; }
        input[type="checkbox"]:checked + .check-tag { background-color: #2d5a27; color: white; border-color: #2d5a27; }
        .cat-tag { cursor: pointer; padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: bold; background: white; color: #64748b; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .cat-tag.active { background: #2d5a27; color: white; border-color: #2d5a27; }
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15, 23, 42, 0.9); z-index: 1000; justify-content: center; align-items: flex-start; padding: 20px; overflow-y: auto; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 100%; max-w: 3xl; border-radius: 2.5rem; padding: 2rem; position: relative; margin: 2rem auto; }
        textarea, input[type="text"] { border: 2px solid #e2e8f0; border-radius: 1rem; padding: 12px; width: 100%; outline: none; background-color: #fcfcfc; transition: border-color 0.2s; }
        .ai-btn { background: linear-gradient(135deg, #2d5a27 0%, #4a7c44 100%); color: white; padding: 6px 16px; border-radius: 999px; font-size: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex gap-2 bg-white/90 backdrop-blur-md p-2 rounded-full shadow-2xl border border-slate-200">
        <button onclick="switchPage('form')" class="px-6 py-2 rounded-full font-bold text-slate-600 transition">✍️ 填寫</button>
        <button onclick="switchPage('query')" class="px-6 py-2 rounded-full font-bold text-slate-600 transition">🔍 查詢</button>
        <button onclick="switchPage('cloud')" class="px-6 py-2 rounded-full font-bold text-slate-600 transition">🌈 文字雲</button>
    </nav>

    <main class="max-w-6xl mx-auto pb-24">
        <h1 class="text-3xl font-bold text-center text-[#2d5a27] mb-8">閱讀共讀筆記-南港幼兒園版</h1>

        <div class="space-y-4 mb-8 glass-card p-6 border-l-8 border-[#2d5a27]">
            <h3 class="text-xs font-black text-slate-400 mb-2 uppercase text-center tracking-widest">目前瀏覽類別 (可多選)</h3>
            <div id="cat-group-1" class="flex flex-wrap gap-2 justify-center"></div>
            <div id="cat-group-2" class="flex flex-wrap gap-2 justify-center border-t pt-4"></div>
        </div>
        
        <section id="page-form" class="page-node active space-y-8">
            <div class="glass-card p-6 md:p-10 border-t-8 border-[#2d5a27]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-slate-800">📗 撰寫紀錄</h2>
                    <div onclick="generateAIHelp()" class="ai-btn">✨ AI 靈感助手 (專業生成)</div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
                    <div class="space-y-6">
                        <div><label class="block font-bold mb-1">繪本名稱<span class="required-star">*</span></label><input type="text" id="title" style="background-color: #fffbeb;" placeholder="請輸入繪本名稱"></div>
                        <div><label class="block font-bold mb-1 text-green-800">📌 核心關鍵字<span class="required-star">*</span></label><input type="text" id="kw" style="background-color: #f0fdf4;" placeholder="AI將根據類別自動填入"></div>
                        <div class="bg-white p-4 rounded-2xl border-2 border-dashed border-slate-200">
                            <label class="block font-bold mb-2">📸 上傳共讀照片</label>
                            <input type="file" id="photo" accept="image/*" capture="environment" class="w-full text-xs">
                        </div>
                        <div>
                            <label class="block font-bold mb-2">使用方式</label>
                            <div class="flex flex-wrap gap-2">
                                <label><input type="checkbox" name="useType" value="團體討論" class="hidden"><span class="check-tag">團體討論</span></label>
                                <label><input type="checkbox" name="useType" value="學習區鷹架" class="hidden"><span class="check-tag">學習區鷹架</span></label>
                                <label><input type="checkbox" name="useType" value="自由閱讀" class="hidden"><span class="check-tag">自由閱讀</span></label>
                                <label><input type="checkbox" name="useType" value="延伸活動" class="hidden"><span class="check-tag">延伸活動</span></label>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 gap-4">
                            <div><label class="block font-bold text-amber-700">📙 出版資訊<span class="required-star">*</span></label><input type="text" id="publish" placeholder="作者、出版社"></div>
                            <div>
                                <label class="block font-bold text-sky-700">🏗️ 提問引導 (對幼兒問法)<span class="required-star">*</span></label>
                                <textarea id="guide" rows="8" placeholder="點擊 AI 助手生成提問..."></textarea>
                            </div>
                        </div>
                        <div><label class="block font-bold text-slate-500">✍️ 我的心得 (大人專業書寫)</label><textarea id="feel" rows="2"></textarea></div>
                        <div>
                            <label class="block font-bold text-slate-500">📝 詳細內容/書籍介紹</label>
                            <div class="flex gap-2 mb-2">
                                <button onclick="searchExternal('books')" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg text-xs font-bold">博客來</button>
                                <button onclick="searchExternal('google')" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg text-xs font-bold">搜尋導讀</button>
                            </div>
                            <textarea id="others" rows="3"></textarea>
                        </div>
                    </div>
                </div>
                <button id="save-btn" onclick="uploadData()" class="w-full bg-[#2d5a27] text-white font-bold py-4 rounded-2xl shadow-xl mt-8 text-lg hover:bg-[#1e3d1a] transition">確認儲存並同步</button>
            </div>
            <div class="glass-card p-6 md:p-10">
                <h3 class="text-xl font-bold text-slate-700 italic">📂 最近紀錄</h3>
                <div id="record-list" class="space-y-4 mt-4"></div>
            </div>
        </section>

        <section id="page-query" class="page-node space-y-8">
            <div class="glass-card p-6 md:p-10">
                <h2 class="text-3xl font-bold text-slate-800 mb-6 text-center">🔍 快速查詢</h2>
                <div class="mb-8 text-center">
                    <input type="text" id="querySearch" oninput="renderQueryList()" placeholder="搜尋書名或出版資訊..." class="w-full p-4 border-2 border-green-100 rounded-2xl outline-none">
                </div>
                <div id="book-query-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </section>

        <section id="page-cloud" class="page-node space-y-8">
            <div class="glass-card p-6 md:p-10 text-center">
                <h2 class="text-3xl font-bold text-slate-800 mb-8">🌈 文字雲成果</h2>
                <div id="cloud-container" class="w-full h-[500px]"><canvas id="cloud-canvas"></canvas></div>
            </div>
        </section>
    </main>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-4xl hover:text-red-500 transition">&times;</button>
            <div id="m-body"></div>
        </div>
    </div>

    <script>
        // 🔴 請確保這串網址與你 GAS 部署後的網址完全相同
        const API_URL = "https://script.google.com/macros/s/AKfycby25k6qhqcMzyFKLaKL6zBx_ks3sBUH4jLXGGFTk4QLWLWcO8B-JcuVtnVZICivUXrF/exec";
        
        const g1 = ["公園", "大樹花草", "鳥類", "好朋友", "建築與設施", "爺爺奶奶", "交通工具"];
        const g2 = ["SEL", "SDGs", "名人傳記", "生活自理", "性別平等", "其他"]; 
        window.selectedCats = ["公園"]; 
        let db = [];

        async function generateAIHelp() {
            const title = document.getElementById('title').value;
            const btn = document.querySelector('.ai-btn');
            if(!title) return alert("請先輸入繪本名稱！");

            btn.innerText = "✨ AI 正在努力分析中...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "ai_generate", title: title })
                });
                const result = await response.json();
                
                // 強效解析 JSON
                let aiData;
                try {
                    aiData = JSON.parse(result.text);
                } catch (e) {
                    const cleaned = result.text.replace(/```json/gi, "").replace(/```/gi, "").trim();
                    aiData = JSON.parse(cleaned);
                }
                
                document.getElementById('guide').value = aiData.guide;
                document.getElementById('feel').value = aiData.feel;
                
                const catMap = { "公園": "自然探索", "交通工具": "工程運輸", "SEL": "情緒教育", "大樹花草": "植物觀察" };
                let kws = "";
                window.selectedCats.forEach(cat => { if(catMap[cat]) kws += catMap[cat] + " "; });
                document.getElementById('kw').value = kws.trim() || "幼教 繪本";

            } catch (e) {
                alert("AI 生成失敗，請確認 GAS 是否部署為新版本，或再試一次。");
            } finally {
                btn.innerText = "✨ AI 靈感助手 (專業生成)";
                btn.disabled = false;
            }
        }

        function searchExternal(type) {
            const title = document.getElementById('title').value;
            if(!title) return alert("請先輸入書名");
            let url = (type === 'books') 
                ? `https://search.books.com.tw/search/query/key/${encodeURIComponent(title)}`
                : `https://www.google.com/search?q=${encodeURIComponent(title + " 繪本 導讀 備課")}`;
            window.open(url, '_blank');
        }

        function clean(str) { return String(str || "").trim(); }

        function init() {
            const b1 = document.getElementById('cat-group-1'), b2 = document.getElementById('cat-group-2');
            b1.innerHTML = ""; b2.innerHTML = "";
            [...g1, ...g2].forEach(cat => {
                const b = document.createElement('div');
                b.className = `cat-tag ${window.selectedCats.includes(cat) ? 'active' : ''}`;
                b.innerText = cat;
                b.onclick = () => {
                    if (window.selectedCats.includes(cat)) {
                        if (window.selectedCats.length > 1) window.selectedCats = window.selectedCats.filter(c => c !== cat);
                    } else window.selectedCats.push(cat);
                    init(); renderList(); renderQueryList(); refreshUI();
                };
                (g1.includes(cat) ? b1 : b2).appendChild(b);
            });
            fetchData();
        }

        async function fetchData() {
            try { const res = await fetch(API_URL); db = await res.json(); renderList(); renderQueryList(); refreshUI(); } catch(e) {}
        }

        function getFilteredDB() { return db.filter(r => window.selectedCats.some(sel => String(r[0]).includes(sel))); }

        function switchPage(page) {
            document.querySelectorAll('.page-node').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            if(page === 'cloud') setTimeout(refreshUI, 300);
            window.scrollTo(0,0);
        }

        function recordTemplate(r) {
            const photo = r[9] || "";
            let img = (photo && !photo.includes("上傳失敗")) 
                ? `<div class="text-center mt-6"><img src="https://drive.google.com/thumbnail?id=${photo.split('id=')[1]}&sz=s1000" class="inline-block max-w-full rounded-3xl shadow-xl"></div>` : "";
            return `<div class="record-entry py-6"><h4 class="font-bold text-3xl text-[#2d5a27] mb-3">📖 ${clean(r[1])}</h4><div class="space-y-4 text-sm"><div class="bg-blue-50 p-5 rounded-2xl border"><b>🏗️ 提問引導：</b>${clean(r[7])}</div><div class="bg-sky-50 p-5 rounded-2xl border"><b>✍️ 我的心得：</b>${clean(r[4])}</div>${img}</div></div>`;
        }

        function renderList() {
            const list = document.getElementById('record-list');
            const filtered = getFilteredDB();
            list.innerHTML = "";
            [...filtered].reverse().slice(0, 5).forEach(r => {
                const item = document.createElement('div');
                item.className = "bg-white p-5 rounded-2xl border mb-2 cursor-pointer hover:bg-green-50";
                item.innerHTML = `<h4 class="font-bold text-[#2d5a27]">📖 ${clean(r[1])}</h4>`;
                item.onclick = () => { document.getElementById('m-body').innerHTML = recordTemplate(r); document.getElementById('modal').style.display = 'block'; };
                list.appendChild(item);
            });
        }

        function renderQueryList() {
            const container = document.getElementById('book-query-list');
            const term = document.getElementById('querySearch').value.toLowerCase();
            const filtered = getFilteredDB().filter(r => String(r[1]).toLowerCase().includes(term));
            container.innerHTML = "";
            [...new Set(filtered.map(r => clean(r[1])))].forEach(name => {
                const btn = document.createElement('div');
                btn.className = "bg-white p-4 rounded-2xl border font-bold text-center cursor-pointer";
                btn.innerText = "📖 " + name;
                btn.onclick = () => {
                    const matched = db.filter(r => clean(r[1]) === name);
                    document.getElementById('m-body').innerHTML = matched.reverse().map(r => recordTemplate(r)).join('');
                    document.getElementById('modal').style.display = 'block';
                };
                container.appendChild(btn);
            });
        }

        function refreshUI() {
            const filtered = getFilteredDB();
            const freq = {};
            filtered.forEach(r => { if(r[2]) clean(r[2]).split(/[\s,，、/]+/).forEach(w => { if(w.length > 1) freq[w] = (freq[w] || 0) + 1; }); });
            const cvs = document.getElementById('cloud-canvas'), cnt = document.getElementById('cloud-container');
            if(!cvs) return;
            cvs.width = cnt.offsetWidth; cvs.height = 500;
            WordCloud(cvs, { list: Object.entries(freq).map(([w, c]) => [w, Math.min(c * 15 + 25, 100)]), fontFamily: 'Noto Sans TC', color: 'random-dark', rotateRatio: 0 });
        }

        const toBase64 = f => new Promise(res => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => res(rd.result); });

        async function uploadData() {
            const btn = document.getElementById('save-btn');
            const file = document.getElementById('photo').files[0];
            if(!document.getElementById('title').value) return alert("書名是必填唷！");
            btn.disabled = true; btn.innerText = "儲存中...";
            let imgData = file ? await toBase64(file) : "";
            const sendData = {
                cat: window.selectedCats.join(", "), title: document.getElementById('title').value,
                kw: document.getElementById('kw').value, child: document.getElementById('child').value,
                feel: document.getElementById('feel').value, publish: document.getElementById('publish').value,
                guide: document.getElementById('guide').value, others: document.getElementById('others').value,
                useType: Array.from(document.querySelectorAll('input[name="useType"]:checked')).map(el => el.value).join(", "),
                img: imgData
            };
            try { 
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(sendData) }); 
                alert("✅ 儲存成功！"); location.reload(); 
            } catch(e) { alert("儲存失敗"); btn.disabled = false; }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>
